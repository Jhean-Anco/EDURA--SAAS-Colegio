name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'fix/**'
      - 'feat/**'
      - 'feature/**'
      - 'test/**'
      - 'chore/**'
      - 'ci/**'
  pull_request:
    branches:
      - main
      - 'release/**'
      - 'fix/**'
      - 'feat/**'
      - 'feature/**'
      - 'test/**'
      - 'chore/**'
      - 'ci/**'

permissions:
  contents: read

defaults:
  run:
    working-directory: back

env:
  NODE_VERSION: '24'

jobs:
  calidad-estatica:
    name: Calidad estatica
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: back/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:unit
      - run: npm run test:cov -- --runInBand

  base-datos:
    name: Base de datos
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: edura
          POSTGRES_PASSWORD: edura_ci
          POSTGRES_DB: edura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      BD_HOST: localhost
      BD_PUERTO: 5432
      BD_USUARIO: edura
      BD_CLAVE: edura_ci
      BD_NOMBRE: edura_test
      BD_SSL: 'false'
      BOOTSTRAP_ADMIN_CORREO: owner.bootstrap@edura.local
      BOOTSTRAP_ADMIN_CLAVE: Bootstrap@2024!Strong
      BOOTSTRAP_ADMIN_NOMBRE: Propietario Plataforma
      BOOTSTRAP_ADMIN_CORREO_VERIFICADO: 'false'
      JWT_SECRETO: ci-secret-no-produccion-32-chars-minimo
      JWT_EMISOR: EDURA_CI
      JWT_AUDIENCIA: EDURA_CI_WEB
      HASH_TOKEN_SECRETO: ci-hash-secret-no-produccion-32-chars-minimo
      INTEGRACION_DOCUMENTOS_HABILITADA: 'false'
      INTEGRACION_RUTAS_HABILITADA: 'false'
      SWAGGER_HABILITADO: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: back/package-lock.json
      - run: npm ci
      - run: npm run db:migration:run
      - run: npm run db:migration:show
      - run: npm run db:seed:catalogos
      - run: npm run db:seed:catalogos
      - run: npm run db:seed:seguridad
      - run: npm run db:seed:seguridad
      - run: npm run db:seed:bootstrap
      - run: npm run db:seed:bootstrap
      - run: npm run db:seed:demo
      - run: npm run db:seed:demo

  migraciones-reversibles:
    name: Migraciones reversibles
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: edura
          POSTGRES_PASSWORD: edura_ci
          POSTGRES_DB: edura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      BD_HOST: localhost
      BD_PUERTO: 5432
      BD_USUARIO: edura
      BD_CLAVE: edura_ci
      BD_NOMBRE: edura_test
      BD_SSL: 'false'
      JWT_SECRETO: ci-secret-no-produccion-32-chars-minimo
      JWT_EMISOR: EDURA_CI
      JWT_AUDIENCIA: EDURA_CI_WEB
      HASH_TOKEN_SECRETO: ci-hash-secret-no-produccion-32-chars-minimo
      INTEGRACION_DOCUMENTOS_HABILITADA: 'false'
      INTEGRACION_RUTAS_HABILITADA: 'false'
      SWAGGER_HABILITADO: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: back/package-lock.json
      - run: npm ci
      - run: npm run db:migration:run
      - run: npm run db:migration:revert
      - run: npm run db:migration:run

  actualizacion-desde-release-anterior:
    name: Actualizacion desde release anterior
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: edura
          POSTGRES_PASSWORD: edura_ci
          POSTGRES_DB: edura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      BD_HOST: localhost
      BD_PUERTO: 5432
      BD_USUARIO: edura
      BD_CLAVE: edura_ci
      BD_NOMBRE: edura_test
      BD_SSL: 'false'
      JWT_SECRETO: ci-secret-no-produccion-32-chars-minimo
      JWT_EMISOR: EDURA_CI
      JWT_AUDIENCIA: EDURA_CI_WEB
      HASH_TOKEN_SECRETO: ci-hash-secret-no-produccion-32-chars-minimo
      INTEGRACION_DOCUMENTOS_HABILITADA: 'false'
      INTEGRACION_RUTAS_HABILITADA: 'false'
      SWAGGER_HABILITADO: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout a la version previa
        run: git checkout 76cdbe511b7adc3ec7aec707645b6848e98adda9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: back/package-lock.json
      - run: npm ci
      - name: Ejecutar migraciones version previa
        run: npm run db:migration:run
      - name: Volver a la rama actual
        run: |
          git restore .
          git checkout -
      - name: Instalar dependencias nuevas
        run: npm ci
      - name: Ejecutar migraciones pendientes
        run: npm run db:migration:run
      - name: Verificar tablas y restricciones
        run: |
          npm run db:migration:show
          npm run test:unit

  e2e:
    name: Pruebas E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [calidad-estatica, base-datos, migraciones-reversibles, actualizacion-desde-release-anterior]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: edura
          POSTGRES_PASSWORD: edura_ci
          POSTGRES_DB: edura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      BD_HOST: localhost
      BD_PUERTO: 5432
      BD_USUARIO: edura
      BD_CLAVE: edura_ci
      BD_NOMBRE: edura_test
      BD_SSL: 'false'
      JWT_SECRETO: ci-secret-no-produccion-32-chars-minimo
      JWT_EMISOR: EDURA_CI
      JWT_AUDIENCIA: EDURA_CI_WEB
      HASH_TOKEN_SECRETO: ci-hash-secret-no-produccion-32-chars-minimo
      INTEGRACION_DOCUMENTOS_HABILITADA: 'false'
      INTEGRACION_RUTAS_HABILITADA: 'false'
      SWAGGER_HABILITADO: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: back/package-lock.json
      - run: npm ci
      - run: npm run db:migration:run
      - run: npm run db:seed:all
      - run: npm run test:e2e
