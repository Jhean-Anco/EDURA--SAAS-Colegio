name: Frontend CI

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'fix/**'
      - 'feat/**'
      - 'feature/**'
    paths:
      - 'front/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'front/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: front

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:coverage
        env:
          SESSION_SECRET: ci_test_secret_that_is_at_least_32_chars_long
          BACKEND_URL: http://localhost:3000
          NODE_ENV: test

      - name: Build
        run: npm run build
        env:
          SESSION_SECRET: ci_test_secret_that_is_at_least_32_chars_long
          BACKEND_URL: http://localhost:3000
          NODE_ENV: production
