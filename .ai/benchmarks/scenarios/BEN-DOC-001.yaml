  - "Conserva el historial de la decisión anterior"
  - "La fecha de actualización es correcta"
  - "El formato sigue la convención de docs/ai/decisions/"
  - "Solo se modifica el ADR especificado, no otros documentos"
  - "No inventa información técnica no provista en el fixture"

archivos_esperados:
  maximos_modificados: 1
  archivos_permitidos:
    - "docs/ai/decisions/ADR-0010-fixture.md"

validaciones:
  - "Archivo existe y tiene sección ## Decisión"
  - "Contiene fecha de actualización"

