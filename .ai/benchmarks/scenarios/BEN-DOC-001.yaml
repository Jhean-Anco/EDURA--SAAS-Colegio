  descripcion: >
    ADR ficticio docs/ai/decisions/ADR-0010-fixture.md desactualizado.
    Hace referencia a una estrategia de migración que cambió.
    Se provee el contexto del cambio como texto en el fixture.

objetivo: >
  Actualizar el ADR para reflejar la decisión actual. Mantener
  el historial de decisiones anteriores. No crear nuevo ADR innecesariamente.

criterios_aceptacion:
