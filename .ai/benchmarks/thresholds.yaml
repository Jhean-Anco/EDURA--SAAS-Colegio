regresiones:
  bloquear_si:
    - metrica: "calidad_total"
      condicion: "baja mas de 5 puntos vs baseline"
      descripcion: "Regresión de calidad inaceptable"
    - metrica: "tokens_totales"
      condicion: "aumenta mas de 20% sin mejora documentada"
      descripcion: "Explosión de consumo de tokens"
    - metrica: "archivos_leidos"
      condicion: "aumenta mas de 30%"
      descripcion: "Expansión de contexto injustificada"
    - metrica: "llamadas_herramientas"
      condicion: "aumenta mas de 30%"
      descripcion: "Uso excesivo de herramientas"
    - metrica: "mcp_externos_activos"
      condicion: "activa MCP no requerido por el escenario"
      descripcion: "MCP no autorizado activado"
    - metrica: "skills_no_relacionadas"
      condicion: "carga Skills fuera del contexto de la tarea"
      descripcion: "Skills irrelevantes cargadas"
    - metrica: "cambios_fuera_alcance"
      condicion: "mayor a 0"
      descripcion: "Modificaciones no autorizadas"
    - metrica: "secretos_detectados"
      condicion: "mayor a 0"
      descripcion: "Exposición de secretos"
    - metrica: "suite_total_en_lugar_de_dirigida"
      condicion: "se ejecutó suite completa sin justificación"
      descripcion: "Validación excesiva injustificada"

  advertir_si:
    - metrica: "duracion_ms"
      condicion: "aumenta por variacion de red"
      descripcion: "Variación de latencia — no bloquear"
    - metrica: "costo_total_usd"
      condicion: "precios no disponibles"
      descripcion: "No se puede calcular costo — advertir"
    - metrica: "tokens_totales"
      condicion: "plataforma no reporta tokens"
      descripcion: "Métrica no disponible — usar proxies"
    - metrica: "muestra"
      condicion: "menos de 3 repeticiones"
      descripcion: "Muestra insuficiente para estadísticas"
