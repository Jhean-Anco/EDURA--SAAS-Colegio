name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'fix/**'
      - 'feat/**'
      - 'feature/**'
      - 'test/**'
      - 'chore/**'
      - 'ci/**'
  pull_request:
    branches:
      - main
      - 'release/**'
      - 'fix/**'
      - 'feat/**'
      - 'feature/**'
      - 'test/**'
      - 'chore/**'
      - 'ci/**'

env:
  NODE_VERSION: '24'
  POSTGRES_VERSION: '16'

jobs:
  lint-build-test:
    name: Lint + Build + Unit Tests + Coverage
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      BD_HOST: localhost
      BD_PUERTO: 5432
      BD_USUARIO: edura
      BD_CLAVE: edura_ci
      BD_NOMBRE: edura_test
      BD_SSL: 'false'
      BOOTSTRAP_ADMIN_CORREO: owner.bootstrap@edura.local
      BOOTSTRAP_ADMIN_CLAVE: Bootstrap@2024!Strong
      BOOTSTRAP_ADMIN_NOMBRE: Propietario Plataforma
      BOOTSTRAP_ADMIN_CORREO_VERIFICADO: 'false'
      JWT_SECRETO: ci-secret-no-produccion-32-chars-minimo
      JWT_EMISOR: EDURA_CI
      JWT_AUDIENCIA: EDURA_CI_WEB
      HASH_TOKEN_SECRETO: ci-hash-secret-no-produccion-32-chars-minimo
      INTEGRACION_DOCUMENTOS_HABILITADA: 'false'
      INTEGRACION_RUTAS_HABILITADA: 'false'
      SWAGGER_HABILITADO: 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Coverage
        run: npm run test:cov -- --runInBand

  migraciones-y-semillas:
    name: Migraciones + Semillas (idempotencia)
    runs-on: ubuntu-latest
    needs: lint-build-test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: edura
          POSTGRES_PASSWORD: edura_ci
          POSTGRES_DB: edura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      BD_HOST: localhost
      BD_PUERTO: 5432
      BD_USUARIO: edura
      BD_CLAVE: edura_ci
      BD_NOMBRE: edura_test
      BD_SSL: 'false'
      BOOTSTRAP_ADMIN_CORREO: owner.bootstrap@edura.local
      BOOTSTRAP_ADMIN_CLAVE: Bootstrap@2024!Strong
      BOOTSTRAP_ADMIN_NOMBRE: Propietario Plataforma
      BOOTSTRAP_ADMIN_CORREO_VERIFICADO: 'false'
      JWT_SECRETO: ci-secret-no-produccion-32-chars-minimo
      JWT_EMISOR: EDURA_CI
      JWT_AUDIENCIA: EDURA_CI_WEB
      HASH_TOKEN_SECRETO: ci-hash-secret-no-produccion-32-chars-minimo
      INTEGRACION_DOCUMENTOS_HABILITADA: 'false'
      INTEGRACION_RUTAS_HABILITADA: 'false'
      SWAGGER_HABILITADO: 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ejecutar migraciones (base limpia)
        run: npm run db:migration:run

      - name: Sembrar catalogo y seguridad (primera vez)
        run: npm run db:seed:catalogos && npm run db:seed:seguridad

      - name: Sembrar catalogo y seguridad (segunda vez - idempotencia)
        run: npm run db:seed:catalogos && npm run db:seed:seguridad

      - name: Sembrar bootstrap
        run: npm run db:seed:bootstrap

      - name: Sembrar bootstrap segunda vez (idempotencia)
        run: npm run db:seed:bootstrap

      - name: Sembrar demo
        run: npm run db:seed:demo

      - name: Sembrar demo segunda vez (idempotencia)
        run: npm run db:seed:demo

  e2e:
    name: Pruebas E2E
    runs-on: ubuntu-latest
    needs: migraciones-y-semillas

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: edura
          POSTGRES_PASSWORD: edura_ci
          POSTGRES_DB: edura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      BD_HOST: localhost
      BD_PUERTO: 5432
      BD_USUARIO: edura
      BD_CLAVE: edura_ci
      BD_NOMBRE: edura_test
      BD_SSL: 'false'
      JWT_SECRETO: ci-secret-no-produccion-32-chars-minimo
      JWT_EMISOR: EDURA_CI
      JWT_AUDIENCIA: EDURA_CI_WEB
      HASH_TOKEN_SECRETO: ci-hash-secret-no-produccion-32-chars-minimo
      INTEGRACION_DOCUMENTOS_HABILITADA: 'false'
      INTEGRACION_RUTAS_HABILITADA: 'false'
      SWAGGER_HABILITADO: 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: npm run db:migration:run && npm run db:seed:catalogos && npm run db:seed:catalogos && npm run db:seed:seguridad && npm run db:seed:seguridad && npm run db:seed:all

      - name: Revert last migration
        run: npm run db:migration:revert

      - name: Apply migration again
        run: npm run db:migration:run

      - name: E2E tests
        run: npm run test:e2e
